apiVersion: skaffold/v4beta9
kind: Config
metadata:
  name: restaurant-service
build:
  artifacts:
    - image: food-delivery/restaurant-service
      context: .
      docker:
        dockerfile: Dockerfile
deploy:
  helm:
    releases:
      - name: restaurant-service
        chartPath: ../../deployments/helm/charts/restaurant-service
        namespace: food-app
        setValues:
          image.repository: food-delivery/restaurant-service
          image.tag: latest
portForward:
  - resourceType: service
    resourceName: restaurant-service
    namespace: food-app
    port: 8080
    localPort: 8002
