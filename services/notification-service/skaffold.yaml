apiVersion: skaffold/v4beta9
kind: Config
metadata:
  name: notification-service
build:
  artifacts:
    - image: food-delivery/notification-service
      context: .
      docker:
        dockerfile: Dockerfile
deploy:
  helm:
    releases:
      - name: notification-service
        chartPath: ../../deployments/helm/charts/notification-service
        namespace: food-app
        setValues:
          image.repository: food-delivery/notification-service
          image.tag: latest
portForward:
  - resourceType: service
    resourceName: notification-service
    namespace: food-app
    port: 8080
    localPort: 8006
