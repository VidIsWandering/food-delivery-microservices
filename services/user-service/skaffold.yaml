apiVersion: skaffold/v4beta9
kind: Config
metadata:
  name: user-service
build:
  artifacts:
    - image: food-delivery/user-service
      context: .
      docker:
        dockerfile: Dockerfile
deploy:
  helm:
    releases:
      - name: user-service
        chartPath: ../../deployments/helm/charts/user-service
        namespace: food-app
        setValues:
          image.repository: food-delivery/user-service
          image.tag: latest
portForward:
  - resourceType: service
    resourceName: user-service
    namespace: food-app
    port: 8080
    localPort: 8001
