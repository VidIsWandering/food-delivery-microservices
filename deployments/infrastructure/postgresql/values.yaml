# PostgreSQL Helm values (Bitnami chart)
# Single instance with multiple databases for cost savings
auth:
  postgresPassword: postgres
  database: user_db

primary:
  persistence:
    size: 2Gi
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  initdb:
    scripts:
      create-databases.sql: |
        CREATE DATABASE order_db;
        CREATE DATABASE restaurant_db;
        CREATE DATABASE payment_db;
